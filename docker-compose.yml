# Yerel geliştirme altyapısı: PostgreSQL + Qdrant + Langfuse
# Kullanım: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: seekbind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - seekbind-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: seekbind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - seekbind-network

  # Langfuse kendi veritabanını app'in Postgres'inden ayrı tutar
  langfuse-db:
    image: postgres:16-alpine
    container_name: seekbind-langfuse-db
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: ${LANGFUSE_DB_NAME}
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - seekbind-network

  langfuse:
    image: langfuse/langfuse:2
    container_name: seekbind-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/${LANGFUSE_DB_NAME}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"
    networks:
      - seekbind-network

networks:
  seekbind-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  langfuse_db_data:
